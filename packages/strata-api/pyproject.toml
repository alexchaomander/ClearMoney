[project]
name = "strata-api"
version = "0.1.0"
description = "Strata API - Financial data platform"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.34.0",
    "pydantic>=2.10.0",
    "email-validator>=2.0.0",
    "pydantic-settings>=2.7.0",
    "sqlalchemy[asyncio]>=2.0.0",
    "asyncpg>=0.30.0",
    "alembic>=1.14.0",
    "cryptography>=43.0.3,<44.0.0",
    "snaptrade-python-sdk>=11.0.0",
    "plaid-python>=21.0.0",
    "python-multipart>=0.0.9",
    "anthropic>=0.40.0",
    "fpdf2>=2.8.0",
    "numpy>=2.0.0",
    "gunicorn>=22.0.0",
    "redis[hiredis]>=5.0.0",
    "sentry-sdk[fastapi]>=2.0.0",
    "slowapi>=0.1.9",
    "pyjwt[crypto]>=2.12.1",
    "stripe>=11.0.0",
    "python-dateutil>=2.9.0.post0",
]

[project.optional-dependencies]
providers = [
    "google-genai>=1.0.0",
    "openai>=1.0.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.25.0",
    "httpx>=0.28.0",
    "ruff>=0.9.0",
    "mypy>=1.14.0",
    "aiosqlite>=0.20.0",
    "coverage>=7.0.0",
]

[tool.setuptools.packages.find]
include = ["app*"]

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[dependency-groups]
dev = [
    "aiosqlite>=0.22.1",
    "coverage>=7.13.5",
    "httpx>=0.28.1",
    "mypy>=1.19.1",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "ruff>=0.15.2",
]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
strict = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
